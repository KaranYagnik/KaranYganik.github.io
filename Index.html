function ParticlesBG() {
  const ref = useRef(null);
  useEffect(() => {
    const c = ref.current; if (!c) return;
    const ctx = c.getContext("2d");
    let w = (c.width = c.offsetWidth), h = (c.height = c.offsetHeight);
    const pts = Array.from({ length: 70 }, () => ({ x: Math.random()*w, y: Math.random()*h, vx: (Math.random()-0.5)*0.35, vy: (Math.random()-0.5)*0.35, r: Math.random()*1.5+0.5 }));
    let raf;
    function draw() {
      ctx.clearRect(0,0,w,h);
      for (const p of pts) { p.x+=p.vx; p.y+=p.vy; if(p.x<0)p.x=w; if(p.x>w)p.x=0; if(p.y<0)p.y=h; if(p.y>h)p.y=0; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fillStyle=ACCENT+"30"; ctx.fill(); }
      for (let i=0;i<pts.length;i++) for (let j=i+1;j<pts.length;j++) { const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy); if(d<110){ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.strokeStyle=ACCENT+Math.floor((1-d/110)*20).toString(16).padStart(2,"0");ctx.lineWidth=0.5;ctx.stroke();} }
      raf=requestAnimationFrame(draw);
    }
    draw();
    const rs=()=>{w=c.width=c.offsetWidth;h=c.height=c.offsetHeight};
    window.addEventListener("resize",rs);
    return ()=>{cancelAnimationFrame(raf);window.removeEventListener("resize",rs)};
  },[]);
  return <canvas ref={ref} style={{position:"absolute",inset:0,width:"100%",height:"100%",pointerEvents:"none"}}/>;
}

function useInView(t=0.12){const ref=useRef(null);const[v,setV]=useState(false);useEffect(()=>{const el=ref.current;if(!el)return;const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting){setV(true);obs.disconnect();}},{threshold:t});obs.observe(el);return()=>obs.disconnect();},[]);return[ref,v];}
function FadeIn({children,delay=0,style={}}){const[ref,v]=useInView();return(<div ref={ref} style={{opacity:v?1:0,transform:v?"translateY(0)":"translateY(28px)",transition:`opacity 0.6s ease ${delay}s, transform 0.6s ease ${delay}s`,...style}}>{children}</div>);}

        <FadeIn delay={0.55}><div style={{display:"flex",gap:12,justifyContent:"center",marginTop:32,flexWrap:"wrap"}}>{[{label:"LinkedIn",href:"https://linkedin.com/in/karan-yagnik"},{label:"GitHub",href:"https://github.com/KaranYganik"},{label:"Email",href:"mailto:Karanyagnik.uk@gmail.com"}].map(l=>(<a key={l.label} href={l.href} target="_blank" rel="noreferrer" style={{color:MUTED,fontSize:12,textDecoration:"none",fontFamily:"'JetBrains Mono',monospace",padding:"6px 14px",borderRadius:6,border:`1px solid ${MUTED}20`,transition:"all 0.3s"}}>{l.label}</a>))}</div></FadeIn>
      </div>
    </div>

    <div style={{padding:"0 24px"}}>
      {/* ABOUT */}
      <Section id="about">
        <SectionTitle sub="cat about_me.md">About Me</SectionTitle>
        <FadeIn delay={0.1}><div style={{background:SURFACE,border:`1px solid ${ACCENT}12`,borderRadius:14,padding:"clamp(20px, 4vw, 32px)"}}>
          <p style={{fontSize:15,lineHeight:1.85,color:MUTED}}>I'm a Cyber Security professional with over two years of industry experience, currently completing my <span style={{color:ACCENT,fontWeight:600}}>MSc in Cyber Security</span> at the University of Hertfordshire, London. My MSc dissertation focuses on <span style={{color:ACCENT}}>AI-Powered Anomaly Detection for Intrusion Detection Systems</span>, combining machine learning with explainable AI.</p>
          <p style={{fontSize:15,lineHeight:1.85,color:MUTED,marginTop:14}}>I have hands-on experience in <span style={{color:RED}}>penetration testing</span> {"\u2014"} leading a grey-box pentest that identified 7 attack vectors and achieved root access through 5 exploitation paths. I specialise in <span style={{color:ACCENT}}>SIEM</span>, <span style={{color:ACCENT}}>vulnerability assessment</span>, <span style={{color:ACCENT}}>incident response</span>, and <span style={{color:ACCENT}}>compliance & risk management</span>.</p>
          <div style={{display:"flex",gap:20,marginTop:28,flexWrap:"wrap"}}>{[{num:"2+",label:"Years in Tech"},{num:"8",label:"Certifications"},{num:"7",label:"Attack Vectors Found"},{num:"99.9%",label:"ML Model Accuracy"}].map(s=>(<div key={s.label} style={{textAlign:"center",flex:"1 1 90px",padding:"14px 8px",background:SURFACE2,borderRadius:10,border:`1px solid ${ACCENT}10`}}><p style={{fontSize:24,fontWeight:700,color:ACCENT,fontFamily:"'JetBrains Mono',monospace",margin:0}}>{s.num}</p><p style={{fontSize:11,color:MUTED,fontFamily:"'JetBrains Mono',monospace",marginTop:4}}>{s.label}</p></div>))}</div>
        </div></FadeIn>
      </Section>

      {/* SKILLS */}
      <Section id="skills"><SectionTitle sub="cat tech_stack.json">Technical Skills</SectionTitle><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(270px,1fr))",gap:14}}>{skills.map((s,i)=><SkillCard key={s.category} {...s} delay={i*0.07}/>)}</div></Section>

      {/* EXPERIENCE */}
      <Section id="experience"><SectionTitle sub="git log --career">Experience</SectionTitle>{experience.map((e,i)=><TimelineItem key={i} item={e} delay={i*0.1} type="exp"/>)}</Section>

      {/* EDUCATION */}
      <Section id="education"><SectionTitle sub="ls ~/education/">Education</SectionTitle>{education.map((e,i)=><TimelineItem key={i} item={e} delay={i*0.1} type="edu"/>)}</Section>

      {/* PROJECTS */}
      <Section id="projects">
        <SectionTitle sub="ls ~/projects/">Projects</SectionTitle>
        <div style={{display:"flex",flexDirection:"column",gap:16}}>
          {projects.filter(p=>p.featured).map((p,i)=><FeaturedProject key={i} project={p} delay={i*0.12}/>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(300px,1fr))",gap:14,marginTop:16}}>
          {projects.filter(p=>!p.featured).map((p,i)=><SmallProject key={i} project={p} delay={i*0.1}/>)}
        </div>
      </Section>

      {/* CERTIFICATIONS */}
      <Section id="certifications"><SectionTitle sub="cat ~/.certs">Certifications</SectionTitle><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:10}}>{certifications.map((c,i)=><CertBadge key={i} cert={c} delay={i*0.06}/>)}</div></Section>

      {/* CONTACT */}
      <Section id="contact">
        <SectionTitle sub="./reach_out.sh">Get In Touch</SectionTitle>
        <FadeIn delay={0.1}><div style={{background:SURFACE,border:`1px solid ${ACCENT}12`,borderRadius:14,padding:36,textAlign:"center"}}>
          <p style={{fontSize:15,color:MUTED,lineHeight:1.8,maxWidth:520,margin:"0 auto 24px"}}>I'm actively seeking Cyber Security roles in the UK {"\u2014"} SOC Analyst, Penetration Tester, Security Analyst, or Cyber Security Engineer. Let's connect.</p>
          <div style={{display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap"}}>{[{icon:"\u{1f4e7}",label:"Karanyagnik.uk@gmail.com",href:"mailto:Karanyagnik.uk@gmail.com"},{icon:"\u{1f4f1}",label:"+44 7909 494 217",href:"tel:+447909494217"},{icon:"\u{1f4bc}",label:"LinkedIn",href:"https://linkedin.com/in/karan-yagnik"},{icon:"\u{1f431}",label:"GitHub",href:"https://github.com/KaranYganik"}].map(c=>(<a key={c.label} href={c.href} target="_blank" rel="noreferrer" style={{display:"flex",alignItems:"center",gap:8,background:SURFACE2,padding:"10px 18px",borderRadius:8,color:TEXT,textDecoration:"none",fontSize:13,fontFamily:"'JetBrains Mono',monospace",border:`1px solid ${ACCENT}12`,transition:"all 0.3s"}} onMouseEnter={e=>{e.currentTarget.style.borderColor=ACCENT+"44";e.currentTarget.style.transform="translateY(-2px)"}} onMouseLeave={e=>{e.currentTarget.style.borderColor=ACCENT+"12";e.currentTarget.style.transform="translateY(0)"}}><span>{c.icon}</span>{c.label}</a>))}</div>
        </div></FadeIn>
      </Section>
    </div>

    <footer style={{textAlign:"center",padding:"28px 24px 20px",borderTop:`1px solid ${ACCENT}08`}}>
      <StatusBar/>
      <p style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:MUTED+"55",marginTop:12}}>Designed & Built by Karan Yagnik {"\u00b7"} {"\u00a9"} 2025</p>
    </footer>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<Portfolio/>);
</script>
</body>
</html>
